openapi: 3.0.3
info:
  title: FLYR PRO API
  description: |
    REST API for the FLYR PRO web application — a field prospecting platform for real estate agents.

    ## Important notes for contributors

    ### iOS coupling
    The iOS app (FLYR) calls many of these routes directly in production. Routes tagged
    with `x-ios-coupled: true` must not be modified without coordinating with iOS development.
    See ARCHITECTURE.md Section 10 for the full coupling map.

    ### Route status
    Each route has an `x-status` extension with one of the following values:
    - `working` — verified functional
    - `broken` — known to return incorrect results or errors
    - `stub` — exists but returns hardcoded/empty response
    - `unknown` — not verified

    ### Authentication
    Most routes require an authenticated Supabase session passed via cookies.
    iOS routes use a Bearer token in the Authorization header.
    Admin routes require the service role key or a founder-level entitlement.

  version: "1.0.0"
  contact:
    name: Harry Brown

servers:
  - url: https://flyrpro.app
    description: Production
  - url: https://www.flyrpro.app
    description: Production (www)
  - url: http://localhost:3000
    description: Local development

tags:
  - name: access
    description: Post-auth routing and access state
  - name: account
    description: User account management
  - name: accountability
    description: Accountability cards and posts
  - name: activity
    description: User activity feed
  - name: admin
    description: Founder/admin only routes
  - name: ai
    description: AI-powered flyer and image generation
  - name: ambassador
    description: Ambassador program
  - name: auth
    description: Authentication handoffs (used by iOS)
  - name: background
    description: Background removal utility
  - name: beacon
    description: Safety beacon (public session tracking)
  - name: billing
    description: Stripe and Apple IAP billing
  - name: brokerages
    description: Brokerage search and leaderboard
  - name: buildings
    description: Building data and management
  - name: campaigns
    description: Campaign CRUD, provisioning, addresses, buildings, routes
  - name: campaign-assignments
    description: Campaign assignment read and write APIs for team routing
  - name: canva
    description: Canva-style QR and flyer generation
  - name: challenges
    description: Challenges and rolling leaderboard
  - name: currency
    description: Currency detection utility
  - name: daily-content
    description: Daily quotes and riddles
  - name: docs
    description: Swagger UI for this OpenAPI spec
  - name: editor
    description: Flyer editor (Canva clone) — partially stubbed
  - name: farms
    description: Farm management and address sync
  - name: feedback
    description: User feedback submission
  - name: flyers
    description: Flyer management — partially stubbed
  - name: generate-qrs
    description: QR code generation for campaigns
  - name: home
    description: Home dashboard data
  - name: integrations
    description: CRM integrations (FUB, HubSpot, BoldTrail, monday, Zapier)
  - name: internal
    description: Internal build and provisioning webhooks
  - name: invites
    description: Workspace invite management
  - name: landing-page
    description: Landing page CTA tracking
  - name: leads
    description: Lead CRM sync
  - name: mapbox
    description: Mapbox tilequery proxy
  - name: meta
    description: Meta Ads OAuth, account discovery, campaign reads, and farm attribution sync
  - name: onboarding
    description: Onboarding completion
  - name: open
    description: Legacy QR scan redirect
  - name: partner-offer
    description: Partner offer onboarding
  - name: profile
    description: User profile management
  - name: q
    description: Modern slug-based QR scan redirect
  - name: qr
    description: QR code analytics, creation, deletion
  - name: qr-generation-jobs
    description: QR generation job status polling
  - name: routes
    description: Route plans and assignments
  - name: scan
    description: Legacy QR scan handler
  - name: share-card
    description: Challenge share cards
  - name: team
    description: Team dashboard, members, leaderboard, activity
  - name: upload-csv
    description: CSV recipient upload
  - name: user
    description: User goals
  - name: zip-qrs
    description: ZIP download of QR codes

# ─────────────────────────────────────────────────────────────
# COMPONENTS
# ─────────────────────────────────────────────────────────────
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sb-access-token
      description: Supabase session cookie (web)
    bearerAuth:
      type: http
      scheme: bearer
      description: Supabase JWT (iOS)

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: string

    Campaign:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        owner_id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        video_url:
          type: string
        scans:
          type: integer
        provision_status:
          type: string
        created_at:
          type: string
          format: date-time

    CampaignAddress:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campaign_id:
          type: string
          format: uuid
        formatted:
          type: string
        address:
          type: string
        house_number:
          type: string
        street_name:
          type: string
        locality:
          type: string
        region:
          type: string
        postal_code:
          type: string
        qr_code_base64:
          type: string
          description: Base64-encoded QR PNG stored directly in DB. Written by /api/generate-qrs.
        purl:
          type: string
          description: Tracking URL encoded in QR. Points to /api/scan?id={address_id}.
        qr_png_url:
          type: string
          description: |
            Supabase Storage URL for QR PNG. NOT written by current generate-qrs.
            Filtered on by zip-qrs and vdp-manifest — this mismatch is a known bug.
        scans:
          type: integer
        last_scanned_at:
          type: string
          format: date-time
        visited:
          type: boolean
        seq:
          type: integer

    QRCode:
      type: object
      properties:
        id:
          type: string
          format: uuid
        campaign_id:
          type: string
          format: uuid
        address_id:
          type: string
          format: uuid
        slug:
          type: string
          description: 8-character alphanumeric short ID
        qr_url:
          type: string
          description: Full short URL e.g. https://flyrpro.app/q/{slug}
        destination_type:
          type: string
          enum: [landingPage, directLink]
        direct_url:
          type: string
        landing_page_id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time

    Entitlement:
      type: object
      properties:
        user_id:
          type: string
          format: uuid
        plan:
          type: string
          enum: [free, pro, team]
        is_active:
          type: boolean
        source:
          type: string
          enum: [stripe, apple]
        current_period_end:
          type: string
          format: date-time

    Workspace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        owner_id:
          type: string
          format: uuid
        subscription_status:
          type: string

    Building:
      type: object
      properties:
        id:
          type: string
          format: uuid
        gers_id:
          type: string
        campaign_id:
          type: string
          format: uuid

# ─────────────────────────────────────────────────────────────
# PATHS
# ─────────────────────────────────────────────────────────────
paths:

  # ── ACCESS ──────────────────────────────────────────────────
  /api/access/redirect:
    get:
      tags: [access]
      summary: Resolve post-auth redirect
      description: |
        Resolves where to send a user after authentication. Used by the iOS app
        and web gate to determine the correct destination (onboarding, subscribe, dashboard).
      x-status: working
      x-ios-coupled: true
      x-ios-caller: FLYR/Features/Auth/Services/AccessAPI.swift:91
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "302":
          description: Redirects to appropriate destination
        "200":
          description: Returns redirect URL as JSON

  /api/access/state:
    get:
      tags: [access]
      summary: Get current access state
      description: |
        Returns the current user's access state including workspace, subscription status,
        and entitlement. Called by the web layout on every page load and by the iOS app.
      x-status: working
      x-ios-coupled: true
      x-ios-caller: FLYR/Features/Auth/Services/AccessAPI.swift:110
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Access state object
        "401":
          description: Unauthorized

  # ── ACCOUNT ─────────────────────────────────────────────────
  /api/account/delete:
    delete:
      tags: [account]
      summary: Delete user account
      x-status: working
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Account deleted
        "401":
          description: Unauthorized

  # ── ACCOUNTABILITY ───────────────────────────────────────────
  /api/accountability-card/latest:
    get:
      tags: [accountability]
      summary: Get latest accountability card
      x-status: broken
      description: |
        Returns 500 in current state. Pre-existing error unrelated to recent changes.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Latest accountability card
        "500":
          description: Server error (known issue)

  /api/accountability-card:
    get:
      tags: [accountability]
      summary: Get accountability cards
      x-status: unknown
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Accountability cards list
    post:
      tags: [accountability]
      summary: Create accountability card
      x-status: unknown
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Created card

  /api/accountability-card/share:
    post:
      tags: [accountability]
      summary: Share accountability card
      x-status: unknown
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Share result

  # ── ACTIVITY ────────────────────────────────────────────────
  /api/activity:
    get:
      tags: [activity]
      summary: Get user activity feed
      x-status: unknown
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Activity events

  # ── ADMIN ───────────────────────────────────────────────────
  /api/admin/ambassadors:
    get:
      tags: [admin]
      summary: List ambassador applications
      x-status: working
      x-auth: founder
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Ambassador applications list

  /api/admin/ambassadors/{applicationId}:
    patch:
      tags: [admin]
      summary: Update ambassador application
      x-status: working
      x-auth: founder
      security:
        - cookieAuth: []
      parameters:
        - name: applicationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated application

  /api/admin/ambassadors/{applicationId}/stripe-connect:
    post:
      tags: [admin]
      summary: Connect ambassador to Stripe
      x-status: unknown
      x-auth: founder
      security:
        - cookieAuth: []
      parameters:
        - name: applicationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Stripe connect result

  /api/admin/challenges:
    get:
      tags: [admin]
      summary: List challenge templates
      x-status: unknown
      x-auth: founder
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Challenge templates

  /api/admin/challenges/{id}:
    patch:
      tags: [admin]
      summary: Update challenge template
      x-status: unknown
      x-auth: founder
      security:
        - cookieAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated challenge

  /api/admin/inbox/feedback:
    get:
      tags: [admin]
      summary: Get feedback inbox
      x-status: unknown
      x-auth: founder
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Feedback items

  /api/admin/inbox/summary:
    get:
      tags: [admin]
      summary: Get inbox summary
      x-status: unknown
      x-auth: founder
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Inbox summary

  /api/admin/inbox/support:
    get:
      tags: [admin]
      summary: Get support inbox
      x-status: unknown
      x-auth: founder
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Support threads

  /api/admin/offers:
    get:
      tags: [admin]
      summary: List partner offers
      x-status: working
      x-auth: founder
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Partner offers list
    post:
      tags: [admin]
      summary: Create partner offer
      x-status: working
      x-auth: founder
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Created offer

  /api/admin/offers/{offerId}:
    get:
      tags: [admin]
      summary: Get partner offer
      x-status: working
      x-auth: founder
      security:
        - cookieAuth: []
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Partner offer
    patch:
      tags: [admin]
      summary: Update partner offer
      x-status: working
      x-auth: founder
      security:
        - cookieAuth: []
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Updated offer

  /api/admin/offers/{offerId}/qr:
    post:
      tags: [admin]
      summary: Generate QR for partner offer
      x-status: unknown
      x-auth: founder
      security:
        - cookieAuth: []
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: QR code generated

  /api/admin/offers/{offerId}/revoke:
    post:
      tags: [admin]
      summary: Revoke partner offer
      x-status: unknown
      x-auth: founder
      security:
        - cookieAuth: []
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Offer revoked

  /api/admin/offers/{offerId}/send-email:
    post:
      tags: [admin]
      summary: Send partner offer email
      x-status: unknown
      x-auth: founder
      security:
        - cookieAuth: []
      parameters:
        - name: offerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Email sent

  /api/admin/workspaces/{workspaceId}/reset:
    post:
      tags: [admin]
      summary: Reset workspace
      x-status: unknown
      x-auth: founder
      security:
        - cookieAuth: []
      parameters:
        - name: workspaceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Workspace reset

  # ── AI ───────────────────────────────────────────────────────
  /api/ai/flyer:
    post:
      tags: [ai]
      summary: Generate AI flyer
      x-status: unknown
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Generated flyer

  /api/ai/flyer/save:
    post:
      tags: [ai]
      summary: Save AI-generated flyer
      x-status: unknown
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Saved flyer

  /api/ai-flyer/generate:
    post:
      tags: [ai]
      summary: Generate AI flyer (alternate endpoint)
      x-status: unknown
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Generated flyer

  /api/ai-flyer/image:
    post:
      tags: [ai]
      summary: Generate AI flyer image
      x-status: unknown
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Generated image

  # ── AMBASSADOR ───────────────────────────────────────────────
  /api/ambassador/apply:
    post:
      tags: [ambassador]
      summary: Submit ambassador application
      x-status: working
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Application submitted

  # ── AUTH ─────────────────────────────────────────────────────
  /api/auth/handoff:
    post:
      tags: [auth]
      summary: Create auth handoff token
      description: |
        Creates a short-lived handoff token for cross-surface authentication.
        Called by the iOS app to initiate a session handoff to the web app.
      x-status: working
      x-ios-coupled: true
      x-ios-caller: FLYR/Services/OvertureAddressService.swift:344
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Handoff token created

  /api/auth/redeem-handoff:
    post:
      tags: [auth]
      summary: Redeem auth handoff token
      description: |
        Redeems a handoff token and establishes a web session.
        Called by the iOS app to complete a session handoff.
      x-status: working
      x-ios-coupled: true
      x-ios-caller: FLYR/Services/OvertureAddressService.swift:365
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Session established

  # ── BACKGROUND REMOVER ───────────────────────────────────────
  /api/background-remover:
    post:
      tags: [background]
      summary: Remove image background
      x-status: unknown
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Image with background removed

  # ── BEACON ───────────────────────────────────────────────────
  /api/beacon/{token}:
    get:
      tags: [beacon]
      summary: Get public safety beacon session
      description: Public route — no auth required. Used for safety beacon feature.
      x-status: unknown
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Beacon session data

  # ── BILLING ──────────────────────────────────────────────────
  /api/billing/apple/verify:
    post:
      tags: [billing]
      summary: Verify Apple IAP transaction
      description: |
        Called directly by the iOS app with a Bearer token to verify an Apple
        in-app purchase and update the user's entitlement. Do not modify without
        coordinating with iOS development.
      x-status: working
      x-ios-coupled: true
      x-ios-caller: FLYR/Features/Billing/EntitlementsService.swift:120
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                transactionId:
                  type: string
                productId:
                  type: string
      responses:
        "200":
          description: Entitlement updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  entitlement:
                    $ref: "#/components/schemas/Entitlement"
        "400":
          description: Invalid transaction
        "401":
          description: Unauthorized

  /api/billing/entitlement:
    get:
      tags: [billing]
      summary: Get current user entitlement
      description: |
        Returns the current user's entitlement (plan, status, expiry).
        Called by both the web app and the iOS app.
      x-status: working
      x-ios-coupled: true
      x-ios-caller: FLYR/Features/Billing/EntitlementsService.swift:82
      security:
        - cookieAuth: []
        - bearerAuth: []
      responses:
        "200":
          description: Current entitlement
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entitlement"
        "401":
          description: Unauthorized

  /api/billing/prices:
    get:
      tags: [billing]
      summary: Get Stripe price list
      x-status: working
      responses:
        "200":
          description: Available prices

  /api/billing/stripe/checkout:
    post:
      tags: [billing]
      summary: Create Stripe checkout session
      description: Creates a Stripe subscription checkout session for the current user.
      x-status: working
      x-ios-coupled: true
      x-ios-caller: docs/IOS_WORKSPACE_AND_ONBOARDING_GUIDE.md:88
      security:
        - cookieAuth: []
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                priceId:
                  type: string
                plan:
                  type: string
                  enum: [annual, monthly]
                currency:
                  type: string
                  enum: [USD, CAD]
                seats:
                  type: integer
      responses:
        "200":
          description: Checkout session URL
        "401":
          description: Unauthorized

  /api/billing/stripe/confirm-session:
    post:
      tags: [billing]
      summary: Confirm Stripe checkout session
      x-status: working
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Session confirmed

  /api/billing/stripe/portal:
    post:
      tags: [billing]
      summary: Create Stripe customer portal session
      x-status: working
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Portal URL

  /api/billing/stripe/referral:
    get:
      tags: [billing]
      summary: Get referral info
      x-status: unknown
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Referral data

  /api/billing/stripe/seats:
    post:
      tags: [billing]
      summary: Update workspace seat count
      x-status: working
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Seats updated

  /api/billing/stripe/webhook:
    post:
      tags: [billing]
      summary: Stripe webhook handler
      description: |
        Receives Stripe subscription lifecycle events. Verified via Stripe signature.
        Not called by the web UI — called by Stripe directly.
      x-status: working
      responses:
        "200":
          description: Webhook processed

  # ── BROKERAGES ───────────────────────────────────────────────
  /api/brokerages/search:
    get:
      tags: [brokerages]
      summary: Search brokerages
      description: Used during onboarding to find and select a brokerage.
      x-status: working
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 15
      responses:
        "200":
          description: Matching brokerages

  # ── BUILDINGS ────────────────────────────────────────────────
  /api/buildings/{gersId}:
    get:
      tags: [buildings]
      summary: Get building by GERS ID
      description: |
        Supports both cookie auth (web) and Bearer token auth (iOS).
        The route explicitly handles both patterns.
      x-status: working
      x-ios-coupled: true
      security:
        - cookieAuth: []
        - bearerAuth: []
      parameters:
        - name: gersId
          in: path
          required: true
          schema:
            type: string
        - name: campaign_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Optional campaign filter used by iOS scan-count lookups.
      responses:
        "200":
          description: Building data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Building"
        "404":
          description: Building not found

  # ── CAMPAIGNS ────────────────────────────────────────────────
  /api/campaigns:
    post:
      tags: [campaigns]
      summary: Create campaign
      description: Creates a new campaign for the current user's workspace.
      x-status: working
      security:
        - cookieAuth: []
      parameters:
        - name: campaignId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                workspace_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Created campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
        "401":
          description: Unauthorized

  /api/campaigns/provision:
    post:
      tags: [campaigns]
      summary: Provision campaign addresses and buildings
      description: |
        Runs the cascading geocoder to generate address and building data for a campaign.
        Called by both the web app and the iOS app.
      x-status: working
      x-ios-coupled: true
      x-ios-caller: FLYR/Feautures/Campaigns/CampaignsAPI.swift:555
