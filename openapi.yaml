  # ── SCAN (LEGACY HANDLER) ────────────────────────────────────
  /api/scan:
    get:
      tags: [scan]
      summary: Legacy QR scan handler
      description: |
        The current active scan handler for web-generated QR codes. All QR codes
        generated by `/api/generate-qrs` point here via `purl`.

        Handles multiple address resolution strategies including:
        - Direct address ID (`?id=`)
        - Campaign + exact address/formatted match (Canva-style QR codes)
        - Campaign + contains match against full normalized address text
        - Campaign + street-only match
        - Campaign + house number and postal-code match
        - Campaign + last-resort in-memory match across up to 500 campaign addresses
        - Campaign-level basic QR (`?campaignId=&basic=true`)

        On successful scan: inserts `scan_events`, calls `increment_building_scans`
        RPC, calls `increment_scan` RPC, then redirects to `campaign.video_url`.

        This handler does NOT write to `qr_code_scans`. Analytics reading from
        that table will not see scans recorded here.
      x-status: working
      x-note: Superseded by /api/q/[slug] for new QR codes. Do not remove — live QR codes in the wild point here.
      parameters:
        - name: id
          in: query
          schema:
            type: string
            format: uuid
          description: campaign_addresses row ID
        - name: campaignId
          in: query
          schema:
            type: string
            format: uuid
        - name: address
          in: query
          schema:
            type: string
          description: Address string (Canva-style QR codes)
        - name: AddressLine
          in: query
          schema:
            type: string
          description: Alternate Canva-style address string parameter
        - name: city
          in: query
          schema:
            type: string
        - name: City
          in: query
          schema:
            type: string
        - name: province
          in: query
          schema:
            type: string
        - name: Province
          in: query
          schema:
            type: string
        - name: postalCode
          in: query
          schema:
            type: string
        - name: PostalCode
          in: query
          schema:
            type: string
        - name: basic
          in: query
          schema:
            type: boolean
          description: If true, record campaign-level scan only
      responses:
        "302":
          description: Redirects to campaign video URL or app URL

