  # ── GENERATE QRS ─────────────────────────────────────────────
  /api/generate-qrs:
    post:
      tags: [generate-qrs]
      summary: Generate QR codes for all campaign addresses
      description: |
        Generates a QR PNG for every address in a campaign and writes it to
        `campaign_addresses.qr_code_base64`. Also writes `campaign_addresses.purl`
        pointing at `/api/scan?id={address_id}`.

        **Known issue:** Does not write to the `qr_codes` table or Supabase Storage.
        This means `zip-qrs` and `vdp-manifest` — which filter on `qr_png_url` —
        return empty results for any campaign generated by this route.

        **iOS safe:** The iOS app does not call this route.

        Called by: campaign page (`app/(main)/campaigns/[campaignId]/page.tsx:592`)
        and farms page (`app/farms/[id]/page.tsx:1104`).
      x-status: working
      x-ios-coupled: false
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [campaignId]
              properties:
                campaignId:
                  type: string
                  format: uuid
                baseUrl:
                  type: string
                  description: Override base URL for QR tracking links. Defaults to NEXT_PUBLIC_APP_URL.
                trackable:
                  type: boolean
                  description: Accepted in the request body but not used by the current implementation.
                forceRegenerate:
                  type: boolean
                  default: true
                  description: If false, skips addresses that already have QR codes.
      responses:
        "200":
          description: QR codes generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  message:
                    type: string
        "400":
          description: Missing campaignId
        "500":
          description: Generation error

