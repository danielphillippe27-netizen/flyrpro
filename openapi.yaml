  # ── ZIP QRS ──────────────────────────────────────────────────
  /api/zip-qrs:
    get:
      tags: [zip-qrs]
      summary: Download ZIP of campaign QR codes
      description: |
        Downloads all QR code PNGs for a campaign as a ZIP file, plus a
        `vdp-manifest.csv` for professional printers.

        **Currently broken:** Filters addresses on `qr_png_url IS NOT NULL`,
        but `generate-qrs` writes `qr_code_base64` instead — so this returns
        404 for campaigns generated only by the current `generate-qrs` route
        unless legacy/storage-backed `qr_png_url` rows already exist.

        **Requires Pro entitlement.** Returns 402 for free users.

        **iOS safe:** The iOS app does not call this route.

        No runtime web UI caller found — this route is not yet wired to a download button.
      x-status: broken
      x-ios-coupled: false
      security:
        - cookieAuth: []
      parameters:
        - name: campaignId
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: ZIP file download
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "402":
          description: Pro subscription required
        "404":
          description: No addresses with qr_png_url found
        "401":
          description: Unauthorized

