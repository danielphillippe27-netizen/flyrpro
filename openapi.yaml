      summary: Modern slug-based QR scan redirect
      description: |
        Looks up the slug in the `qr_codes` table, performs bot filtering,
        records a scan in `qr_code_scans`, calls `record_public_qr_scan_outcome`
        on first scan, and redirects to the destination (landing page or direct URL).

        This handler is fully implemented and correct. It is not yet used by
        web-generated QR codes — `generate-qrs` still encodes `/api/scan` URLs.
        Fix planned in Phase 3.
      x-status: working
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
            description: 8-character alphanumeric slug
      responses:
        "302":
          description: Redirects to destination URL
        "404":
          description: Slug not found

